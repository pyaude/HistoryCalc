<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>HistoryCalc - 带历史记录的计算器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #0D0D12;
      color: #fff;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
      -webkit-user-select: none;
    }
    .display {
      flex: 3;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: flex-end;
      padding: 20px 24px;
    }
    .expression {
      font-size: 18px;
      color: rgba(158,158,158,0.7);
      font-family: monospace;
      min-height: 24px;
      transition: opacity 0.2s;
    }
    .result {
      font-size: 56px;
      font-weight: 300;
      letter-spacing: -1px;
      transition: color 0.4s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }
    .flash { color: #00E676 !important; }
    .keypad {
      flex: 5;
      display: flex;
      flex-direction: column;
      gap: 5px;
      padding: 12px;
    }
    .row {
      display: flex;
      gap: 5px;
      flex: 1;
    }
    .key {
      flex: 1;
      border: none;
      border-radius: 16px;
      font-size: 26px;
      font-weight: 400;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .key:active { transform: scale(0.95); }
    .key-num { background: #1C1C24; color: #fff; }
    .key-action { background: rgba(158,158,158,0.15); color: #fff; }
    .key-op { background: rgba(0,230,118,0.2); color: #00E676; }
    .key-op.active { background: rgba(0,230,118,0.4); }
    .key-eq { background: #00E676; color: #0D0D12; font-weight: 600; }
    .nav {
      display: flex;
      border-top: 1px solid rgba(158,158,158,0.08);
      background: #0D0D12;
    }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      color: rgba(158,158,158,0.5);
      font-size: 12px;
      padding: 12px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }
    .nav-btn.active { color: #00E676; }
    .nav-btn svg { width: 24px; height: 24px; }
    .history-panel {
      position: fixed; bottom: 0; left: 0; right: 0; top: 0;
      background: #0D0D12;
      z-index: 10;
      transform: translateY(100%);
      transition: transform 0.3s;
      display: flex;
      flex-direction: column;
    }
    .history-panel.show { transform: translateY(0); }
    .history-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px; border-bottom: 1px solid rgba(158,158,158,0.08);
    }
    .history-header h2 { font-size: 18px; font-weight: 500; }
    .history-header button {
      background: none; border: none; color: #FF3D00; font-size: 14px; cursor: pointer;
    }
    .history-list { flex: 1; overflow-y: auto; padding: 8px 0; }
    .history-item {
      background: #1C1C24; margin: 4px 16px; padding: 16px;
      border-radius: 16px; cursor: pointer;
      transition: transform 0.15s;
      display: flex; align-items: center; gap: 14px;
    }
    .history-item:active { transform: scale(0.98); }
    .history-icon {
      width: 44px; height: 44px; border-radius: 12px;
      background: rgba(0,230,118,0.15);
      display: flex; align-items: center; justify-content: center;
    }
    .history-content { flex: 1; }
    .history-result { font-size: 22px; font-weight: 500; }
    .history-meta {
      font-size: 12px; color: rgba(158,158,158,0.5); margin-top: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .history-expr { font-size: 13px; color: rgba(158,158,158,0.6); }
    .empty {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; color: rgba(158,158,158,0.4);
    }
    .empty svg { width: 72px; height: 72px; margin-bottom: 20px; opacity: 0.2; }
    .toast {
      position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
      background: #333; color: #fff; padding: 10px 20px; border-radius: 8px;
      font-size: 14px; opacity: 0; transition: opacity 0.3s;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="display" id="display">
  <div class="expression" id="expr"></div>
  <div class="result" id="result">0</div>
</div>

<div class="keypad">
  <div class="row">
    <button class="key key-action" onclick="clearAll()">C</button>
    <button class="key key-action" onclick="backspace()">⌫</button>
    <button class="key key-op" id="opdiv" onclick="setOp('÷')">÷</button>
  </div>
  <div class="row">
    <button class="key key-num" onclick="digit('7')">7</button>
    <button class="key key-num" onclick="digit('8')">8</button>
    <button class="key key-num" onclick="digit('9')">9</button>
    <button class="key key-op" id="opmul" onclick="setOp('×')">×</button>
  </div>
  <div class="row">
    <button class="key key-num" onclick="digit('4')">4</button>
    <button class="key key-num" onclick="digit('5')">5</button>
    <button class="key key-num" onclick="digit('6')">6</button>
    <button class="key key-op" id="opsub" onclick="setOp('−')">−</button>
  </div>
  <div class="row">
    <button class="key key-num" onclick="digit('1')">1</button>
    <button class="key key-num" onclick="digit('2')">2</button>
    <button class="key key-num" onclick="digit('3')">3</button>
    <button class="key key-op" id="opadd" onclick="setOp('+')">+</button>
  </div>
  <div class="row">
    <button class="key key-num" onclick="digit('0')">0</button>
    <button class="key key-num" onclick="digit('.')">.</button>
    <button class="key key-eq" style="flex:2" onclick="calculate()">=</button>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" id="navCalc" onclick="showCalc()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/>
    </svg>
    计算器
  </button>
  <button class="nav-btn" id="navHistory" onclick="showHistory()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
    </svg>
    历史
  </button>
</nav>

<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <h2>历史记录</h2>
    <button onclick="clearHistory()">清空全部</button>
  </div>
  <div class="history-list" id="historyList">
    <div class="empty" id="emptyState">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
      </svg>
      <div>暂无历史记录</div>
      <div style="font-size:14px;margin-top:8px">开始你的第一次计算吧 ✨</div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const MAX_HISTORY = 10;
let display = '0', expression = '', firstOp = null, op = null, resetDisplay = false;
let history = JSON.parse(localStorage.getItem('historycalc') || '[]');

function saveHistory() { localStorage.setItem('historycalc', JSON.stringify(history)); }
function updateDisplay() {
  document.getElementById('result').textContent = display;
  document.getElementById('expr').textContent = expression;
  document.getElementById('expr').style.opacity = expression ? '1' : '0';
}

function flash() {
  const r = document.getElementById('result');
  r.classList.add('flash');
  setTimeout(() => r.classList.remove('flash'), 400);
}

function digit(d) {
  if (resetDisplay) { display = d; resetDisplay = false; }
  else if (display === '0' && d !== '.') display = d;
  else if (d === '.' && display.includes('.')) return;
  else display += d;
  updateDisplay();
}

function setOp(o) {
  if (op && !resetDisplay) calculate();
  firstOp = parseFloat(display);
  op = o;
  expression = display + ' ' + o + ' ';
  resetDisplay = true;
  updateDisplay();
  document.querySelectorAll('.key-op').forEach(k => k.classList.remove('active'));
  const idMap = {'÷':'opdiv','×':'opmul','−':'opsub','+':'opadd'};
  if (idMap[o]) document.getElementById(idMap[o]).classList.add('active');
}

function calculate() {
  if (!op || firstOp === null) return;
  const second = parseFloat(display);
  if (isNaN(second)) return;
  let result;
  switch(op) {
    case '+': result = firstOp + second; break;
    case '−': result = firstOp - second; break;
    case '×': result = firstOp * second; break;
    case '÷': result = second !== 0 ? firstOp / second : NaN; break;
    default: return;
  }
  const fullExpr = expression + display + ' =';
  const resultStr = isNaN(result) ? '错误' : 
    (Number.isInteger(result) ? result.toString() : parseFloat(result.toFixed(8)).toString());
  
  if (!isNaN(result)) {
    history.push({ content: resultStr, expression: fullExpr, time: Date.now() });
    if (history.length > MAX_HISTORY) history = history.slice(-MAX_HISTORY);
    saveHistory();
  }
  
  display = resultStr;
  expression = fullExpr;
  op = null; firstOp = null;
  resetDisplay = true;
  document.querySelectorAll('.key-op').forEach(k => k.classList.remove('active'));
  updateDisplay();
}

function clearAll() { display = '0'; expression = ''; op = null; firstOp = null; resetDisplay = false;
  document.querySelectorAll('.key-op').forEach(k => k.classList.remove('active')); updateDisplay(); }

function backspace() {
  if (resetDisplay) return;
  display = display.length > 1 ? display.slice(0, -1) : '0';
  updateDisplay();
}

function timeAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return '刚刚';
  if (diff < 3600) return Math.floor(diff/60) + '分钟前';
  if (diff < 86400) return Math.floor(diff/3600) + '小时前';
  if (diff < 172800) return '昨天';
  return Math.floor(diff/86400) + '天前';
}

function renderHistory() {
  const list = document.getElementById('historyList');
  const empty = document.getElementById('emptyState');
  if (history.length === 0) {
    list.innerHTML = '';
    list.appendChild(empty);
    return;
  }
  empty.remove();
  list.innerHTML = history.slice().reverse().map((h, i) => `
    <div class="history-item" onclick="recall(${history.length - 1 - i})">
      <div class="history-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#00E676" stroke-width="2">
          <rect x="4" y="2" width="16" height="20" rx="2"/>
        </svg>
      </div>
      <div class="history-content">
        <div class="history-result">${h.content}</div>
        <div class="history-meta">
          ${h.expression ? `<span class="history-expr">${h.expression}</span>` : ''}
          <span>${timeAgo(h.time)}</span>
        </div>
      </div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(158,158,158,0.3)" stroke-width="2">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>
  `).join('');
}

function recall(index) {
  const h = history[index];
  display = h.content;
  expression = h.expression;
  op = null; firstOp = null; resetDisplay = true;
  document.querySelectorAll('.key-op').forEach(k => k.classList.remove('active'));
  updateDisplay();
  flash();
  showCalc();
}

function clearHistory() {
  if (!confirm('确定清空全部历史记录？')) return;
  history = [];
  saveHistory();
  renderHistory();
}

function showHistory() {
  document.getElementById('historyPanel').classList.add('show');
  document.getElementById('navHistory').classList.add('active');
  document.getElementById('navCalc').classList.remove('active');
  renderHistory();
}

function showCalc() {
  document.getElementById('historyPanel').classList.remove('show');
  document.getElementById('navCalc').classList.add('active');
  document.getElementById('navHistory').classList.remove('active');
}

updateDisplay();
renderHistory();
</script>
</body>
</html>
